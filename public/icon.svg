<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <!-- Outer compass circle — gold dashed -->
  <circle cx="22" cy="22" r="20" stroke="#C9A14A" stroke-width="0.9" stroke-dasharray="2.5 3.5" opacity="0.4"/>

  <!-- Cardinal ticks -->
  <line x1="22" y1="3"  x2="22" y2="6.5"  stroke="#C9A14A" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="22" y1="37.5" x2="22" y2="41" stroke="#C9A14A" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="3"  y1="22" x2="6.5" y2="22"  stroke="#C9A14A" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="37.5" y1="22" x2="41" y2="22" stroke="#C9A14A" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>

  <!-- Heart from two compass arcs -->
  <path
    d="M22 34
       C17.5 28.5, 7 25, 7 17.5
       C7 11.5, 12 9, 15.5 9
       C18 9, 20.4 10.4, 22 13
       C23.6 10.4, 26 9, 28.5 9
       C32 9, 37 11.5, 37 17.5
       C37 25, 26.5 28.5, 22 34Z"
    fill="#9E3B4E"
    opacity="0.93"
  />

  <!-- North needle — gold -->
  <polygon points="22,10.5 20.3,20 23.7,20" fill="#C9A14A" opacity="0.92"/>
  <!-- South needle — muted rose -->
  <polygon points="22,32.5 20.3,24 23.7,24" fill="#9E3B4E" opacity="0.45"/>

  <!-- Pivot -->
  <circle cx="22" cy="22" r="2" fill="#C9A14A" opacity="0.97"/>
</svg>
